version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns:
          - expo*
          - "@expo/*"
          - react-native*
      convex:
        patterns:
          - convex*
          - "@convex-dev/*"
      next:
        patterns:
          - next*
          - eslint-config-next
