name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: fundingpro

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fundingpro
          POSTGRES_PASSWORD: fundingpro_dev
          POSTGRES_DB: fundingpro
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fundingpro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fundingpro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Init database
        env:
          DATABASE_URL: postgresql://fundingpro:fundingpro_dev@localhost:5433/fundingpro
          USE_LOCAL_DATABASE: "true"
        run: npm run db:init

      - name: Typecheck and unit tests
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Deploy readiness check
        env:
          DATABASE_URL: postgresql://fundingpro:fundingpro_dev@localhost:5433/fundingpro
          USE_LOCAL_DATABASE: "true"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
          RESEND_API_KEY: "re_placeholder"
          RESEND_FROM_EMAIL: "info@fundingpro.uz"
          ADMIN_EMAILS: "admin@fundingpro.uz"
        run: npm run deploy:check

      - name: Build
        env:
          DATABASE_URL: postgresql://fundingpro:fundingpro_dev@localhost:5433/fundingpro
          USE_LOCAL_DATABASE: "true"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
          RESEND_API_KEY: "re_placeholder"
          RESEND_FROM_EMAIL: "info@fundingpro.uz"
          ADMIN_EMAILS: "admin@fundingpro.uz"
        run: npm run build

      - name: API auth integration
        env:
          DATABASE_URL: postgresql://fundingpro:fundingpro_dev@localhost:5433/fundingpro
          USE_LOCAL_DATABASE: "true"
          SKIP_INTEGRATION_BUILD: "true"
          TEST_PORT: "3098"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
          RESEND_API_KEY: "re_placeholder"
          RESEND_FROM_EMAIL: "info@fundingpro.uz"
          ADMIN_EMAILS: "admin@fundingpro.uz"
        run: npm run test:integration

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        env:
          DATABASE_URL: postgresql://fundingpro:fundingpro_dev@localhost:5433/fundingpro
          USE_LOCAL_DATABASE: "true"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          CI: "true"
        run: npm run test:e2e
