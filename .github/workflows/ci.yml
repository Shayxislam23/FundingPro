name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fundingpro
    env:
      CONVEX_AGENT_MODE: anonymous
      NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Zm9vLWJhci0xMy5jbGVyay5hY2NvdW50cy5kZXYk"
      CLERK_SECRET_KEY: "sk_test_Y2xlcmsuZGV2JHRlc3Qk"
      CLERK_JWT_ISSUER_DOMAIN: "https://placeholder.clerk.accounts.dev"
      RESEND_API_KEY: "re_placeholder"
      RESEND_FROM_EMAIL: "info@fundingpro.uz"
      ADMIN_EMAILS: "admin@fundingpro.uz"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Convex codegen
        run: |
          if ! test -f convex/_generated/api.d.ts; then
            echo "Missing convex/_generated/api.d.ts; run npm run convex:codegen locally and commit."
            exit 1
          fi
          echo "Using committed Convex generated types (skip CI codegen)."

      - name: Convex v.any() audit
        run: node scripts/convex-any-audit.mjs

      - name: Convex .collect() audit
        run: node scripts/convex-collect-audit.mjs

      - name: Typecheck and unit tests
        run: npm run typecheck && npm test

      - name: Convex tests
        run: npm run test:convex

      - name: Lint (zero warnings)
        run: |
          npm run lint --max-warnings=0
          npm run lint --workspace=@fundingpro/mobile --max-warnings=0

      - name: Deploy readiness check
        run: npm run deploy:check

      - name: Payments and App Links env (informational)
        continue-on-error: true
        run: |
          npm run payments:golive-check || true
          npm run app-links:check || true

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: fundingpro
    env:
      NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Zm9vLWJhci0xMy5jbGVyay5hY2NvdW50cy5kZXYk"
      CLERK_SECRET_KEY: "sk_test_Y2xlcmsuZGV2JHRlc3Qk"
      RESEND_API_KEY: "re_placeholder"
      RESEND_FROM_EMAIL: "info@fundingpro.uz"
      ADMIN_EMAILS: "admin@fundingpro.uz"
      # No live Convex in CI: serve seed catalog for public endpoints so the
      # API contract can be exercised (see lib/db/catalog-fallback.ts).
      PUBLIC_API_SEED_FALLBACK: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build
        run: npm run build
        working-directory: fundingpro

      - name: API contract and Playwright e2e
        run: |
          npm run start -- -p 3099 &
          SERVER_PID=$!
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3099/api/v1/health > /dev/null; then break; fi
            sleep 2
          done
          SMOKE_BASE_URL=http://127.0.0.1:3099 npm run contract:mobile-api
          npx playwright install chromium --with-deps
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3099 npm run test:e2e
          kill $SERVER_PID || true

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared packages
        run: |
          npm run typecheck --workspace=@fundingpro/shared
          npm run typecheck --workspace=@fundingpro/api-types

      - name: Typecheck mobile
        run: npm run typecheck --workspace=@fundingpro/mobile

      - name: Lint mobile (zero warnings)
        run: npm run lint --workspace=@fundingpro/mobile --max-warnings=0

      - name: API types unit tests
        run: npm test --workspace=@fundingpro/api-types

      - name: Maestro smoke (optional)
        continue-on-error: true
        run: |
          if ! command -v maestro >/dev/null 2>&1; then
            if command -v brew >/dev/null 2>&1; then
              brew install mobile-dev-inc/tap/maestro || true
            fi
          fi
          if command -v maestro >/dev/null 2>&1; then
            maestro --version || true
            if [ -n "${MAESTRO_APP_PATH:-}" ] && [ -e "$MAESTRO_APP_PATH" ]; then
              maestro test mobile/maestro/ --format junit --output mobile/maestro-results.xml
            else
              echo "Maestro CLI ready; set MAESTRO_APP_PATH to a simulator .app to run flows in CI."
              ls -1 mobile/maestro/*.yaml
            fi
          else
            echo "Maestro not installed; skipping mobile UI smoke."
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Semgrep SAST
        run: |
          python -m pip install --upgrade pip
          pip install semgrep==1.96.0
          semgrep --config fundingpro/.semgrep/fundingpro.yml --error --quiet fundingpro mobile packages

      - name: npm audit (high+, production deps per workspace)
        run: |
          npm audit --omit=dev --audit-level=high -w fundingpro
          npm audit --omit=dev --audit-level=high -w @fundingpro/mobile

      - name: Security audit orchestrator (0 open Medium+)
        working-directory: fundingpro
        env:
          SECURITY_AUDIT_FAIL_MEDIUM: "1"
        run: npm run security:audit
