name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fundingpro
    env:
      NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
      RESEND_API_KEY: "re_placeholder"
      RESEND_FROM_EMAIL: "info@fundingpro.uz"
      ADMIN_EMAILS: "admin@fundingpro.uz"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Convex codegen
        run: npm run convex:codegen

      - name: Typecheck and unit tests
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Deploy readiness check
        run: npm run deploy:check

      - name: Build
        run: npm run build

      - name: API smoke (contract + Playwright)
        run: |
          npm run start -- -p 3099 &
          SERVER_PID=$!
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3099/api/v1/health > /dev/null; then break; fi
            sleep 2
          done
          SMOKE_BASE_URL=http://127.0.0.1:3099 npm run contract:mobile-api
          npx playwright install chromium --with-deps
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3099 npm run test:e2e
          kill $SERVER_PID || true
        continue-on-error: ${{ github.event_name == 'pull_request' }}

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared packages
        run: |
          npm run typecheck --workspace=@fundingpro/shared
          npm run typecheck --workspace=@fundingpro/api-types

      - name: Typecheck mobile
        run: npm run typecheck --workspace=@fundingpro/mobile

      - name: Lint mobile
        run: npm run lint --workspace=@fundingpro/mobile

      - name: API types unit tests
        run: npm test --workspace=@fundingpro/api-types

      - name: Maestro smoke (optional)
        continue-on-error: true
        run: |
          if ! command -v maestro >/dev/null 2>&1; then
            if command -v brew >/dev/null 2>&1; then
              brew install mobile-dev-inc/tap/maestro || true
            fi
          fi
          if command -v maestro >/dev/null 2>&1; then
            maestro --version || true
            if [ -n "${MAESTRO_APP_PATH:-}" ] && [ -e "$MAESTRO_APP_PATH" ]; then
              maestro test mobile/maestro/ --format junit --output mobile/maestro-results.xml
            else
              echo "Maestro CLI ready; set MAESTRO_APP_PATH to a simulator .app to run flows in CI."
              ls -1 mobile/maestro/*.yaml
            fi
          else
            echo "Maestro not installed; skipping mobile UI smoke."
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Semgrep SAST
        working-directory: fundingpro
        run: npx --yes semgrep@1.96.0 --config .semgrep/fundingpro.yml --error --quiet ..

      - name: npm audit (high+)
        run: npm audit --audit-level=high
