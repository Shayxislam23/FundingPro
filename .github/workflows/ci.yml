name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fundingpro
    env:
      NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
      RESEND_API_KEY: "re_placeholder"
      RESEND_FROM_EMAIL: "info@fundingpro.uz"
      ADMIN_EMAILS: "admin@fundingpro.uz"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Convex codegen
        run: npm run convex:codegen

      - name: Typecheck and unit tests
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Deploy readiness check
        run: npm run deploy:check

      - name: Build
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared packages
        run: |
          npm run typecheck --workspace=@fundingpro/shared
          npm run typecheck --workspace=@fundingpro/api-types

      - name: Typecheck mobile
        run: npm run typecheck --workspace=@fundingpro/mobile

      - name: Lint mobile
        run: npm run lint --workspace=@fundingpro/mobile

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Semgrep SAST
        working-directory: fundingpro
        run: npx --yes semgrep@1.96.0 --config .semgrep/fundingpro.yml --error --quiet ..

      - name: npm audit (high+)
        run: npm audit --audit-level=high
