rules:
  - id: hardcoded-secret
    patterns:
      - pattern-regex: '(?i)(api[_-]?key|secret|password|token)\s*=\s*["''][a-zA-Z0-9_\-]{16,}["'']'
    message: Possible hardcoded secret
    severity: ERROR
    languages: [typescript, javascript]
    paths:
      exclude:
        - "**/*.test.mjs"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - ".github/**"

  - id: dangerously-set-inner-html
    pattern: dangerouslySetInnerHTML
    message: Review XSS risk for dangerouslySetInnerHTML
    severity: WARNING
    languages: [typescript, javascript]

  - id: convex-deploy-key-in-client
    patterns:
      - pattern-regex: 'NEXT_PUBLIC_[A-Z0-9_]*(SECRET|SERVICE_ROLE|DEPLOY_KEY|PRIVATE)[A-Z0-9_]*'
    message: Service/secret keys must not be exposed to the client via NEXT_PUBLIC_
    severity: ERROR
    languages: [typescript, javascript]

  - id: pool-query-interpolation
    pattern: |
      pool.query(`...${$VAR}...`)
    message: Avoid string interpolation in SQL; use parameterized queries
    severity: ERROR
    languages: [typescript, javascript]
    paths:
      exclude:
        - "**/scripts/**"
