appId: uz.fundingpro.app
env:
  # Clerk dev instance only — +clerk_test suppresses email delivery; OTP is always 424242
  # https://clerk.com/docs/guides/development/testing/test-emails-and-phones
  CLERK_TEST_EMAIL: e2e+clerk_test@example.com
  CLERK_TEST_OTP: "424242"
---
# Smoke: Clerk email OTP sign-in (development instance)
- launchApp:
    clearState: true
- assertVisible: "FundingPro"
- tapOn: "Войти"
- assertVisible: "Вход"
- assertVisible: "Код на email — через Clerk"
- tapOn: "email@example.com"
- inputText: ${CLERK_TEST_EMAIL}
- tapOn: "Получить код"
- extendedWaitUntil:
    visible: "6-значный код"
    timeout: 15000
- tapOn: "6-значный код"
- inputText: ${CLERK_TEST_OTP}
- tapOn: "Подтвердить"
- extendedWaitUntil:
    visible: "Главная"
    timeout: 20000
