appId: uz.fundingpro.app
env:
  CLERK_TEST_EMAIL: e2e+clerk_test@example.com
  CLERK_TEST_OTP: "424242"
---
# Smoke: «Мой путь» screen (individuals-first onboarding wizard)
# Expects incomplete onboarding so the home checklist CTA is visible.
- runFlow: auth-login.yaml
- extendedWaitUntil:
    visible: "Первые шаги в FundingPro"
    timeout: 15000
- tapOn: "Пройти по шагам"
- extendedWaitUntil:
    visible: "Мой путь"
    timeout: 10000
- assertVisible: "Заполнить личный профиль"
- assertVisible: "Все шаги"
